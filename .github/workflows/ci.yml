name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      # The Tauri binary's generate_context! macro checks that
      # `frontendDist` (apps/desktop/dist) exists at compile time, so we
      # need to build the Vite bundle before any cargo command that
      # compiles the desktop crate.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundle
        run: pnpm --filter @dayseam/desktop build

      - name: cargo fmt
        run: cargo fmt --all -- --check
      # `--all-features` matches CONTRIBUTING.md / AGENTS.md: the desktop crate
      # gates dev-only IPC behind `dev-commands`; without the flag clippy never
      # sees that code path (CI still uses a separate `cargo test --all-features`).
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  # **MAS-1b / MAS-2a / MAS-2b.** Prove both Tauri merge profiles produce a signed `.app`,
  # that `codesign` embeds the expected entitlement keys, and that the
  # **MAS** bundle’s real binary stays alive briefly under App Sandbox (**MAS-2b**).
  # **MAS-8a:** the same steps also run from `mas-package-verify.yml` → job
  # `mas-8a-desktop-bundle` on `v*` tags, `workflow_dispatch`, and a weekly schedule
  # — keep those files in sync.
  # Separate from the `rust` job so `cargo test` stays the long pole and this job
  # can use a tighter cache key for bundling only.
  desktop-bundle-profiles:
    name: desktop-bundle (direct + MAS)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop frontend (Vite)
        run: pnpm --filter @dayseam/desktop build

      # `tauri.conf.json` sets `bundle.createUpdaterArtifacts: true` with a
      # production `plugins.updater.pubkey`. The bundler then requires
      # `TAURI_SIGNING_PRIVATE_KEY` (release-only secret). This job only
      # needs a signed `.app` for entitlement smoke tests — merge off
      # updater artifacts so PR CI does not depend on signing secrets.
      - name: Tauri bundle — direct SKU (`app` only)
        working-directory: apps/desktop
        run: >-
          pnpm exec tauri build --bundles app
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # Bundles land under the **workspace** `target/` (see DAY-66 in
      # `scripts/release/build-dmg.sh`), not `apps/desktop/src-tauri/target/`.
      - name: Codesign entitlements — direct
        run: |
          TARGET_DIR="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          APP="${TARGET_DIR}/release/bundle/macos/Dayseam.app"
          test -d "$APP"
          bash scripts/ci/verify-tauri-bundle-entitlements.sh "$APP" direct
          bash scripts/ci/verify-bundle-privacy-manifest.sh "$APP"

      - name: Tauri bundle — MAS merge profile (`app` only)
        working-directory: apps/desktop
        run: >-
          pnpm exec tauri build --bundles app
          --config src-tauri/tauri.mas.conf.json
          --config '{"bundle":{"createUpdaterArtifacts":false}}'
          --features mas

      - name: Codesign entitlements — MAS (sandbox plist)
        run: |
          TARGET_DIR="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          APP="${TARGET_DIR}/release/bundle/macos/Dayseam.app"
          test -d "$APP"
          bash scripts/ci/verify-tauri-bundle-entitlements.sh "$APP" mas
          bash scripts/ci/verify-bundle-privacy-manifest.sh "$APP"

      # **MAS-2b.** Real `main` + WebView shell — launch the MAS bundle binary
      # for a bounded interval so regressions that crash under sandbox fail here.
      - name: MAS sandbox launch smoke (real shell)
        run: |
          TARGET_DIR="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          APP="${TARGET_DIR}/release/bundle/macos/Dayseam.app"
          test -d "$APP"
          bash scripts/ci/mas-sandbox-launch-smoke.sh "$APP" 22

  # Cheap Linux build of every crate that does NOT depend on Tauri /
  # the desktop frontend bundle. macOS-only `rust` job above is the
  # source of truth for the full workspace, but most contributors
  # (and most future CI consumers) will be on Linux, so we want every
  # core / engine / sink / connector crate to keep building and
  # testing on Ubuntu without having to pay for another macOS minute.
  rust-linux:
    name: rust-linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus desktop)
        run: cargo test --workspace --exclude dayseam-desktop --all-features

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm --recursive --if-present run test
      # DAY-171 removed the former "Build website (astro build)" step.
      # The marketing site no longer lives in this monorepo — its
      # canonical home is now `dayseam/dayseam.github.io`, which runs
      # `astro check && astro build` in its own deploy workflow on
      # every push to `main`. A duplicate astro build here would only
      # guard code this repo no longer owns.

  # Release-engineering shell tests. These exercise the helpers the
  # release workflow depends on (version bumping, PREV resolution,
  # release-notes extraction) against scratch git repos and
  # synthetic CHANGELOGs — a regression test net for a layer that
  # was previously only validated when a real release ran. The
  # v0.1.0 capstone discovered two bugs in release.yml (Unreleased-
  # only preflight and naive PREV inference) that would have been
  # caught here if the job had existed a PR earlier; this job
  # closes that loop for every release from v0.1.1 onward.
  shell-scripts:
    # DAY-122 / R-5. Pre-v0.6.5 this job only ran on ubuntu-latest,
    # which left a whole class of silent regressions — BSD vs GNU
    # awk (`\b` word-boundary portability, handled by the SF-3
    # patch), BSD vs GNU `grep -E` differences, `mktemp -d` flag
    # skew, `sed -i` in-place semantics — outside the CI matrix.
    # Adding a `macos-latest` leg means any script in `scripts/ci`
    # or `scripts/release` that silently uses a GNU-only flag
    # fails here before it bites the release-only macOS runner.
    # The self-tests for every gate run identically under both
    # shells, so the cost of the extra matrix leg is a few minutes
    # against the repo's eng-minute budget.
    name: shell-scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: test-bump-version.sh
        run: bash scripts/release/test-bump-version.sh
      - name: test-resolve-prev-version.sh
        run: bash scripts/release/test-resolve-prev-version.sh
      - name: test-extract-release-notes.sh
        run: bash scripts/release/test-extract-release-notes.sh
      - name: test-close-changelog.sh
        run: bash scripts/release/test-close-changelog.sh
      # DAY-164: validate that the descendant-check helper the release
      # workflow calls before its master push correctly distinguishes
      # "fast-forward safe" from "drift, refuse to push". The helper
      # is what replaced the v0.8.2-era `--force-with-lease` push
      # that silently orphaned v0.8.1's chore(release) commit; a
      # regression here would silently re-introduce that failure
      # mode, which is exactly the kind of bug the release workflow
      # wouldn't catch until another back-to-back release hit.
      - name: test-assert-master-descendant.sh
        run: bash scripts/release/test-assert-master-descendant.sh
      # DAY-113 / F-10: enforce that no production file adds a bare
      # `tokio::spawn` or `tauri::async_runtime::spawn` call. The
      # workspace ships `dayseam_core::runtime::supervised_spawn`
      # precisely so panic-eating fire-and-forget spawns (like the
      # one F-10 found in `startup.rs`) become a gate failure at PR
      # time rather than a silent production bug weeks later. The
      # companion `test-no-bare-spawn.sh` fuzzes the gate itself
      # against acceptance/rejection fixtures so a regression in the
      # gate logic also fails CI.
      - name: test-no-bare-spawn.sh (gate self-test)
        run: bash scripts/ci/test-no-bare-spawn.sh
      - name: no-bare-spawn.sh (workspace scan)
        run: bash scripts/ci/no-bare-spawn.sh
      # DAY-122 / T-3: validate `apps/desktop/src-tauri/entitlements.plist`
      # at PR time, not only at release time. The same two checks run
      # later inside `scripts/release/build-dmg.sh` — moving them into
      # a standalone script lets `ci.yml` enforce them on every PR so
      # a regression (re-introducing an XML comment, or breaking the
      # plist) fails fast instead of exploding four minutes into the
      # universal cargo build on release day. On ubuntu-latest
      # `plutil` isn't available, so the lint branch is skipped and
      # the comment gate (plain `grep`) still runs — which is the
      # check that catches the actual v0.6.2 regression mode. The
      # release workflow keeps running the full gate on macOS via
      # `build-dmg.sh`, which now delegates to the same script so
      # there is a single source of truth.
      - name: test-check-entitlements.sh (gate self-test)
        run: bash scripts/ci/test-check-entitlements.sh
      - name: check-entitlements.sh (entitlements.plist validity)
        run: bash scripts/ci/check-entitlements.sh
      # **MAS-7a.** Privacy manifest script syntax (embed checked in
      # `desktop-bundle-profiles` on macOS only).
      - name: bash -n verify-bundle-privacy-manifest.sh (syntax)
        run: bash -n scripts/ci/verify-bundle-privacy-manifest.sh
      - name: plutil -lint PrivacyInfo.xcprivacy (source, macOS only)
        if: matrix.os == 'macos-latest'
        run: plutil -lint "${{ github.workspace }}/apps/desktop/src-tauri/PrivacyInfo.xcprivacy"
      # **MAS-1b+.** Same AMFI / plutil gate for the MAS plist (macOS
      # only — `plutil` is absent on ubuntu-latest; the comment grep
      # still runs when ENTITLEMENTS_FILE is overridden).
      - name: check-entitlements.sh (entitlements.mas.plist validity)
        if: matrix.os == 'macos-latest'
        env:
          ENTITLEMENTS_FILE: ${{ github.workspace }}/apps/desktop/src-tauri/entitlements.mas.plist
        run: bash scripts/ci/check-entitlements.sh
      - name: bash -n mas-sandbox-launch-smoke.sh (syntax)
        run: bash -n scripts/ci/mas-sandbox-launch-smoke.sh
      - name: bash -n build-mas-app.sh (syntax, MAS-8b)
        run: bash -n scripts/release/mas/build-mas-app.sh
      - name: bash -n check-unreleased-for-semver-pr.sh (syntax, DAY-195 / MAS-8c)
        run: bash -n scripts/release/check-unreleased-for-semver-pr.sh
      - name: bash -n mas-connect-upload-preflight.sh (syntax, MAS-8d)
        run: bash -n scripts/release/mas/mas-connect-upload-preflight.sh

  # DAY-195: same extract-release-notes preflight release.yml runs,
  # but at PR time — empty [Unreleased] used to fail only post-merge.
  changelog-semver-pr:
    name: changelog preflight (semver PR)
    timeout-minutes: 10
    if: >
      github.event_name == 'pull_request' &&
      (contains(join(github.event.pull_request.labels.*.name, ','), 'semver:patch') ||
       contains(join(github.event.pull_request.labels.*.name, ','), 'semver:minor') ||
       contains(join(github.event.pull_request.labels.*.name, ','), 'semver:major'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Verify CHANGELOG would satisfy release.yml extract step
        env:
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: bash scripts/release/check-unreleased-for-semver-pr.sh
